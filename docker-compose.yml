version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fantasy-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: fantasy_app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: